server:
  port: 8053

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/builder
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

gemini:
  api-key: ${GEMINI_API_KEY}

springdoc:
  api-docs:
    path: /api-docs

